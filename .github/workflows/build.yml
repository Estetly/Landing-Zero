name: Build and push to GCP a full stack application of Estetly Waiting List

on:
  push:
    tags:
      - 'v*'

env:
  REGION: europe-west9
  PROJECT_ID: estetly
  REPO: landing-page-zero
  FRONTEND_IMAGE_NAME: waiting-list-frontend

jobs:
  build-push:
    name: Build and push to GCP
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set Vars
      run: |
       echo "FRONTEND_IMAGE_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.FRONTEND_IMAGE_NAME }}" >> $GITHUB_ENV
       
    - name: Google Cloud Auth
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.SERVICE_ACCOUNT_KEY }}

    - name: set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Docker auth
      run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

    - name: Set up docker buildx
      uses: docker/setup-buildx-action@v3

    - name: Get and push frontend image to GCP
      uses: docker/build-push-action@v5
      with:
        context: ./estetlyWaitingList/frontend
        push: true
        tags: ${{ env.FRONTEND_IMAGE_TAG }}:${{ github.ref_name }}
        cache-from: type=gha
        cache-to: type=gha,mode=max


   
      
